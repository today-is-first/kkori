spring:
  datasource:
    # 테스트용 H2 설정 - Jenkins에서 환경변수로 오버라이드 가능
    url: ${DB_URL:jdbc:h2:mem:kkori-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.h2.Driver}

    # 커넥션 풀 설정
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      # 테스트: create-drop, 배포: validate/update
      ddl-auto: ${DDL_AUTO:create-drop}
    properties:
      hibernate:
        # H2용 방언으로 기본값 설정, Jenkins에서 MySQL로 오버라이드 가능
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
        show_sql: ${HIBERNATE_SHOW_SQL:true}
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    database-platform: ${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
    open-in-view: false
  
  sql:
    init:
      mode: never
      data-locations: []
      schema-locations: []
      continue-on-error: true

  # 배포 환경에서는 환경변수로 설정 주입

  # JWT 설정 (Jenkins 환경변수에서 주입)
jwt:
  secret-key: ${JWT_SECRET_KEY}
  ACCESS_TOKEN_MINUTE_TIME: ${JWT_ACCESS_TOKEN_MINUTE_TIME:30}
  REFRESH_TOKEN_MINUTE_TIME: ${JWT_REFRESH_TOKEN_MINUTE_TIME:10080}

# Kakao OAuth2 설정 (Jenkins 환경변수에서 주입)
kakao:
  client-id: ${KAKAO_CLIENT_ID}
  redirect-url: ${KAKAO_REDIRECT_URL}
  client-secret: ${KAKAO_CLIENT_SECRET}
  token-url: ${KAKAO_TOKEN_URL:https://kauth.kakao.com/oauth/token}

# GMS API 설정 (Jenkins 환경변수에서 주입)
gms:
  api-key: ${GMS_API_KEY}
  whisper-url: ${GMS_WHISPER_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1/audio/transcriptions}
  gpt-url: ${GMS_GPT_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1/chat/completions}

# Actuator 설정 (헬스체크용)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true

# 로깅 설정
logging:
  level:
    root: INFO
    com.kkori: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 서버 설정
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-threads: 200
    accept-count: 100
    connection-timeout: 20000

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080,https://kkori.site}